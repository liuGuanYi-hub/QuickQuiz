# 生产环境配置
spring.application.name=QuickQuiz-backend

# 数据库（通过环境变量注入，禁止硬编码）
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/quickquiz?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 生产：JPA 全权交给 Flyway，不允许 JPA 动表
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Flyway 生产启用
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:}
jwt.secret.encoding=${JWT_SECRET_ENCODING:HEX}

# CORS（通过环境变量控制）
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# AI + OCR（可选，按需启用）
ai.siliconflow.enabled=${AI_SILICONFLOW_ENABLED:false}
ai.siliconflow.api-key=${AI_SILICONFLOW_API_KEY:}
ai.siliconflow.model=${AI_SILICONFLOW_MODEL:Qwen/Qwen2.5-7B-Instruct}
ocr.baidu.enabled=${OCR_BAIDU_ENABLED:false}
ocr.baidu.api-key=${OCR_BAIDU_API_KEY:}
ocr.baidu.secret-key=${OCR_BAIDU_SECRET_KEY:}
