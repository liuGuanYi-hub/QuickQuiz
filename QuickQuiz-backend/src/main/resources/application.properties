spring.application.name=QuickQuiz-backend

# 敏感项请用环境变量覆盖：SPRING_DATASOURCE_*、JWT_SECRET、JWT_SECRET_ENCODING
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/quickquiz?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA：本地开发默认 update + 打印 SQL；生产请使用 spring.profiles.active=prod
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway：准备好 db/migration 脚本后再在生产环境启用（见 application-prod.properties）
spring.flyway.enabled=false

spring.threads.virtual.enabled=false

# JWT：密钥为 HEX（偶数位）或 BASE64，由 jwt.secret.encoding 指定
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.secret.encoding=${JWT_SECRET_ENCODING:HEX}

# ============ AI 出题配置（硅基流动）============
# 免费API Key: https://console.siliconflow.cn
ai.siliconflow.enabled=${AI_SILICONFLOW_ENABLED:false}
ai.siliconflow.api-key=${AI_SILICONFLOW_API_KEY:}
ai.siliconflow.model=${AI_SILICONFLOW_MODEL:Qwen/Qwen2.5-7B-Instruct}

# ============ OCR 配置（百度文字识别）============
# 免费额度5000次/天，申请: https://console.bce.baidu.com
ocr.baidu.enabled=${OCR_BAIDU_ENABLED:false}
ocr.baidu.api-key=${OCR_BAIDU_API_KEY:}
ocr.baidu.secret-key=${OCR_BAIDU_SECRET_KEY:}
